name: Deploy API

on:
  push:
    branches:
      - main

jobs:

  deploy:

    runs-on: self-hosted

    steps:

      - name: Baixar código
        uses: actions/checkout@v4

      - name: Atualizar aplicação
        run: |
          cd /srv/apps/controle-de-insumos-api

          git pull origin main

          docker compose down

          docker compose up -d --build

          docker image prune -f